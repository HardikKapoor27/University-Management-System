# ─── DataSource ───────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ums_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# ─── CORS ──────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins in production, e.g.
# CORS_ALLOWED_ORIGINS=https://your-app.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ─── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ─── File uploads (MCQ question docx/pdf parsing) ─────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── JWT ──────────────────────────────────────────────────────
# IMPORTANT: Change jwt.secret to a long random string in production
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ─── OpenAPI / Swagger ────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.university.ums=INFO
logging.level.org.springframework.security=WARN
